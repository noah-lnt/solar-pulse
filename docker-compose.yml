services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-solarpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-solarpulse_secret}
      POSTGRES_DB: ${POSTGRES_DB:-solarpulse}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - solarpulse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-solarpulse}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - solarpulse

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - solarpulse
      - web
    labels:
      - "traefik.enable=true"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.solarpulse-http.rule=Host(`${TRAEFIK_HOST:-solarpulse.local}`)"
      - "traefik.http.routers.solarpulse-http.entrypoints=web"
      - "traefik.http.routers.solarpulse-http.middlewares=solarpulse-https-redirect"
      - "traefik.http.middlewares.solarpulse-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.solarpulse-https-redirect.redirectscheme.permanent=true"
      # HTTPS
      - "traefik.http.routers.solarpulse.rule=Host(`${TRAEFIK_HOST:-solarpulse.local}`)"
      - "traefik.http.routers.solarpulse.entrypoints=websecure"
      - "traefik.http.routers.solarpulse.tls=true"
      - "traefik.http.routers.solarpulse.tls.certresolver=letsencrypt"
      - "traefik.http.services.solarpulse.loadbalancer.server.port=80"
      - "traefik.docker.network=web"

volumes:
  pgdata:

networks:
  solarpulse:
    driver: bridge
  web:
    external: true
